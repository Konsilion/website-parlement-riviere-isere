site_name: Parlement de la rivière Isère
site_author: Nicolas Brémond
site_description: Ecouter la rivière et ses affluents.
site_url: https://konsilion.github.io/website-parlement-riviere-isere
repo_url: https://github.com/konsilion/website-parlement-riviere-isere
repo_name: konsilion/website-parlement-riviere-isere
edit_uri: edit/master/mkdocs/docs/

extra:
    generator: false

theme:
    name: material
    features:
      - content.action.edit
      - navigation.indexes
      - navigation.tracking
      - navigation.expand
      - navigation.top
      - navigation.tabs
      - navigation.tabs.sticky
    language: fr
    palette:
        primary: blue grey
        accent: blue
    logo: https://github.com/Konsilion/website-parlement-riviere-isere/blob/master/mkdocs/media/logo-blanc-flaticon-PRI.png?raw=true
    favicon: https://github.com/Konsilion/website-parlement-riviere-isere/blob/master/mkdocs/media/logo-parlement-isere.png?raw=true
    
plugins:
  - macros
  - mkdocs-video

markdown_extensions:
  - toc:
      toc_depth: 2
  - tables
  - admonition
  - footnotes
  - attr_list
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde




extra_css:
  - personnel.css

copyright: Un site web développé avec ❤ par Nicolas Brémond pour le Collectif du Parlement de la rivière Isère. Made with <a href="https://squidfunk.github.io/mkdocs-material/" target="_blank">Material for MkDocs Insiders</a>
